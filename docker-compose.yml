name: phare

services:
  phare:
    container_name: phare
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    profiles: [generate]
    command: ["php", "examples/basic-blog/generate.php"]

  preview:
    container_name: phare-preview
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./examples/basic-blog/output:/usr/share/nginx/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    profiles: [preview]
